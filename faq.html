      <h2>General Questions</h2>
      <div class="universal-accordion-group" 
           data-exclusive="true"
           data-items='[
             {
               "title": "Who can join GameDev Knights?",
               "content": "GDK is open to all UCF students regardless of major, background, or experience level. Whether you are studying Computer Science, Digital Media, Studio Art, Music, or Business, there is a role for you in game development."
             },
             {
               "title": "Do I need to know how to code to join the club?",
               "content": "Not at all! Game development requires a wide range of disciplines. We actively welcome artists, writers, sound designers, musicians, UI/UX designers, project managers, and playtesters."
             },
             {
               "title": "Are there membership dues to join?",
               "content": "Basic entry to general meetings, guest speaker events, and our open Discord community is entirely free. However, formal enrollment as a paid dues member grants premium privileges including physical merchandise bundles, server badge status, equipment rentals, and guaranteed cabinet space at our end-of-term exhibition showcases."
             },
             {
               "title": "Where and when does the club meet?",
               "content": "General body sessions and specialized workshops are hosted weekly across the UCF Main Campus, typically during weekday evenings. Check the dynamic calendar on our homepage or monitor our Discord announcement channels for precise building locations, room numbers, and digital stream linkages."
             },
             {
               "title": "Can alumni or non-UCF students participate?",
               "content": "While our formal project pathways, structural leadership positions, and funding mechanisms are strictly reserved for current active UCF students, alumni and community enthusiasts are highly welcome to join our open Discord community, attend public guest lectures, and test games during showcase events."
             }
           ]'>
      </div>

      <h2>Events & Projects</h2>
      <div class="universal-accordion-group" 
           data-exclusive="true"
           data-items='[
             {
               "title": "How do the club project programs work?",
               "content": "At the start of each semester, members pitch game concepts or look for teams during our initial workshops. Teams work collaboratively over the term to finish a project, which is then exhibited during our end-of-semester arcade showcase."
             },
             {
               "title": "What exactly is a Game Jam?",
               "content": "A Game Jam is an accelerated hackathon event where developers assemble into rapid teams to build a fully functional video game from scratch within a restricted window—typically 48 hours. Every game must incorporate a unique, top-secret design constraint or thematic criteria unveiled right at the launch window."
             },
             {
               "title": "How do I join a development team if I do not have a group?",
               "content": "Our structured team-formation workshops at the beginning of each semester are tailor-made for this. We facilitate dedicated networking sessions, specialized skill-matching boards, and pitch segments where project leads present concepts looking for developers like you."
             },
             {
               "title": "What engines and software tools do club projects use?",
               "content": "Teams are free to build games using any framework or tools they prefer. Most of our members choose industry-standard platforms like Unity, Unreal Engine, or Godot, alongside software like Blender, Aseprite, Maya, and FMOD for asset pipeline management."
             },
             {
               "title": "What is the end-of-semester Arcade Showcase?",
               "content": "The Showcase is our flagship celebration event held at the end of Fall and Spring terms. We set up public testing terminals, custom arcade rigs, and projection setups across campus spaces for students, professors, and industry professionals to play the games built by our members during the semester."
             }
           ]'>
      </div>

      <h2>Career & Mentorship</h2>
      <div class="universal-accordion-group" 
           data-exclusive="true"
           data-items='[
             {
               "title": "What is the Little Big Mentorship Program?",
               "content": "This program matches experienced student developers and alumni (Bigs) with incoming beginners or members exploring a new discipline (Littles). Over the course of the semester, mentors provide portfolio reviews, skill development challenges, and personal career advice."
             },
             {
               "title": "Does the club provide portfolio feedback or resume reviews?",
               "content": "Yes, we run dedicated portfolio clinics, resume workshops, and practice interview sessions ahead of major professional conferences and hiring seasons. Senior members and visiting alumni look over code repositories, art stations, and audio showreels."
             },
             {
               "title": "How does the club help students get ready for the Game Developers Conference (GDC)?",
               "content": "GDK organizes structured prep sessions for GDC covering networking etiquette, business card construction, and portfolio pitch design. We also coordinate hotel blocks, travel plans, and group cohorts to help make the trip to San Francisco more affordable and accessible for our members."
             },
             {
               "title": "Do industry professionals visit the club?",
               "content": "We regularly host technical lectures, production panels, and studio workshops led by industry professionals, including engineers, artists, and designers from studios like EA Tiburon, Iron Galaxy, Disney, and various independent dev groups."
             }
           ]'>
